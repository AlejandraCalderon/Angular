<h2 class=" text-2xl font-bold mt-5" >Search Page</h2>
<h3 class="text-sm text-gray-400">Searching for GIFs, input your query here...</h3>

<section class="flex flex-col gap-4" >
<input
    type="text"
    placeholder="Search GIFs..."
    class="mt-3 border border-gray-300 p-2 rounded"
    (keyup.enter)="onSearch(txtSearch.value)"
    #txtSearch
     />
</section>

<div class="py-5">
    <gif-list [gifs]="gifs()"/>
</div>
