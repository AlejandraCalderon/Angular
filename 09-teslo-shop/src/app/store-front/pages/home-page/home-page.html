<h1 class="text-3xl font-bold font-montserrat">Todos los productos {{paginationService.currentPage()}}</h1>
<h2>Para todos los gustos</h2>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
    @for (product of productsResource.value()?.products; track $index) {
    <product-card [product]="product"></product-card>
    }
</div>
<shared-pagination [pages]="productsResource.value()?.pages ?? 0" [currentPage]="paginationService.currentPage()"/>
<div class="divider"></div>
