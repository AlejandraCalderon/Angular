<div class="card bg-base-100 w-100 shadow-sm animate-fadeIn">
    <figure class="px-10 pt-10">
        <img [src]="product().images | productImage" [alt]="product().title" class="rounded-xl">
    </figure>
    <div class="card-body items-center text-center">
        <h2 class="card-title font-montserrat text-accent text-xl hover:underline pointer" [routerLink]="['/product',product().slug]">{{product().title}}</h2>
        <p>{{ product().description | slice:0:70 }}...</p>
        <div class="card-actions">
            <a [routerLink]="['/product',product().slug]" class="btn btn-info"> Ver más</a>
        </div>
    </div>
</div>
