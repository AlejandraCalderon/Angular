<div #map></div>

<section id="controls">
  <h2 class="text-2xl font-bold text-black mb-2">
    Zoom
    <small class="text-blue-800 font-normal"
      >{{zoom() | number : '1.0-0'}}</small
    >
  </h2>

  <input
    type="range"
    class="range range-primary"
    min="1"
    max="20"
    value="10"
    (input)="zoom.set(+txtZoom.value)"
    #txtZoom
  />
  
  <h2 class="text-2xl font-bold text-black mb-2">
    Coordinates
    <hr />
    <small class="text-blue-800 font-normal">
      latitude: {{ coordinates().lat | number : '1.4-4' }}, longitude: {{
      coordinates().lng | number : '1.4-4' }}</small
    >
  </h2>
</section>
