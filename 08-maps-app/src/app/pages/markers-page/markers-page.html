<div #map class="h-[calc(100vh-64px)]"></div>

<section class="fixed w-[260px] bg-white rounded top-20 left-20">
  <h2 class="text-xl font-bold mb-2 text-black">Markers</h2>

  <div class="flex flex-col gap-2 p-2 max-h-[400px] overflow-y-auto">
    @for (marker of markers(); track marker.id) {
    <div
      class="form-control"
      (click)="flyToMarker(marker.mapBoxMarker.getLngLat())"
      (dblclick)="deleteMarker(marker)"
    >
      <label class="label cursor-pointer">
        <span class="text-black"
          >{{ marker.mapBoxMarker.getLngLat() | json }}</span
        >
        <input
          type="radio"
          name="radio-12"
          checked="checked"
          class="radio"
          [style]="{ 'background-color': marker.mapBoxMarker._color }"
        />
      </label>
    </div>
    } @empty {
    <div class="text-black">No markers available</div>
    }
  </div>
</section>
