
<h1 class="text-2xl" >Por región</h1>
<h3 class="text-lg" >Selecciona una región para ver los países</h3>


<section class="row mt-2" >
  <div class="flex-col" >
    @for (item of regions; track item) {
      <button class="btn btn-outline mr-2" (click)="selectedRegion.set(item)" [class.btn-primary]="selectedRegion() === item" >
        {{ item }}
      </button>
    }
  </div>
</section>

  <country-list [countries]="regionResource.value() ?? []"
                [errorMesage]="regionResource.error() ?? ''"
                [isEmpty]="regionResource.value()?.length === 0"
                [isLoading]="regionResource.isLoading()"
                 />
